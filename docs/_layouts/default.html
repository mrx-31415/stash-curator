<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0b1220">
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <link rel="icon" href="{{ '/assets/stash-curator.svg' | relative_url }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}">
  </head>
  <body>
    <a class="skip-link" href="#content">Skip to content</a>
    <header class="site-header">
      <nav class="nav wrap" aria-label="Primary navigation">
        <a class="brand" href="{{ '/' | relative_url }}">
          <img src="{{ '/assets/stash-curator.svg' | relative_url }}" alt="" width="36" height="36">
          <span>Stash Curator</span>
        </a>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-links">Menu</button>
        <div class="nav-links" id="site-links">
          <a href="{{ '/getting-started/' | relative_url }}">Get started</a>
          <a href="{{ '/using-curator/' | relative_url }}">Use Curator</a>
          <a href="{{ '/recommendations/' | relative_url }}">How it works</a>
          <a href="{{ '/privacy/' | relative_url }}">Privacy</a>
          <a href="{{ '/contributing/' | relative_url }}">Contribute</a>
          <a href="https://github.com/mrx-31415/stash-curator">GitHub</a>
        </div>
      </nav>
    </header>
    <main id="content" class="wrap{% if page.wide %} wide{% endif %}">
      {{ content }}
    </main>
    <footer class="site-footer wrap">
      <p>Stash Curator is preview software, licensed under <a href="https://github.com/mrx-31415/stash-curator/blob/main/LICENSE">AGPL-3.0</a>.</p>
    </footer>
    <script>
      const button = document.querySelector('.nav-toggle');
      button.addEventListener('click', () => {
        const open = button.getAttribute('aria-expanded') === 'true';
        button.setAttribute('aria-expanded', String(!open));
        document.querySelector('#site-links').classList.toggle('open', !open);
      });
    </script>
  </body>
</html>
