<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" role="img" aria-labelledby="title"><title id="title">Synthetic reversible Prune review queue</title><rect width="960" height="500" fill="#08111f"/><rect width="960" height="58" fill="#101b2d"/><text x="30" y="36" fill="#f4f7fb" font-family="system-ui" font-size="20" font-weight="700">Prune</text><text x="30" y="105" fill="#f4f7fb" font-family="system-ui" font-size="27" font-weight="700">Review before tagging</text><text x="30" y="134" fill="#aebbd0" font-family="system-ui" font-size="14">Nothing is deleted. Every tag action can be reversed.</text><g transform="translate(30 166)" font-family="system-ui"><rect width="900" height="74" rx="10" fill="#101b2d" stroke="#293a55"/><rect x="10" y="10" width="92" height="54" rx="6" fill="#3c4057"/><text x="120" y="32" fill="#f4f7fb" font-size="16" font-weight="700">Uncertain Horizon</text><text x="120" y="55" fill="#aebbd0" font-size="13">Suspect · weak fit and repeated quick exits</text><rect x="742" y="19" width="138" height="36" rx="8" fill="#6a4b86"/><text x="765" y="42" fill="white" font-size="13">Apply [Prune]</text></g><g transform="translate(30 254)" font-family="system-ui"><rect width="900" height="74" rx="10" fill="#101b2d" stroke="#293a55"/><rect x="10" y="10" width="92" height="54" rx="6" fill="#304f63"/><text x="120" y="32" fill="#f4f7fb" font-size="16" font-weight="700">Muted Echo</text><text x="120" y="55" fill="#aebbd0" font-size="13">Explicit dislike · awaiting review</text><rect x="742" y="19" width="138" height="36" rx="8" fill="#6a4b86"/><text x="765" y="42" fill="white" font-size="13">Apply [Prune]</text></g><g transform="translate(30 342)" font-family="system-ui"><rect width="900" height="74" rx="10" fill="#101b2d" stroke="#4a6b5d"/><rect x="10" y="10" width="92" height="54" rx="6" fill="#3d465c"/><text x="120" y="32" fill="#f4f7fb" font-size="16" font-weight="700">Old Frequency</text><text x="120" y="55" fill="#44d19d" font-size="13">Tagged [Prune] · reversible</text><rect x="742" y="19" width="138" height="36" rx="8" fill="#263d3a" stroke="#4a6b5d"/><text x="762" y="42" fill="#b9f4dc" font-size="13">Remove tag</text></g></svg>
