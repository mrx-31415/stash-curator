<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 560" role="img" aria-labelledby="title"><title id="title">Synthetic local Discover recommendation</title><rect width="620" height="560" fill="#08111f"/><rect width="620" height="58" fill="#101b2d"/><text x="28" y="36" fill="#f4f7fb" font-family="system-ui" font-size="19" font-weight="700">Discover</text><text x="28" y="94" fill="#f4f7fb" font-family="system-ui" font-size="25" font-weight="700">A familiar anchor, one stretch</text><g transform="translate(28 124)"><rect width="564" height="380" rx="14" fill="#101b2d" stroke="#4d437b"/><rect x="14" y="14" width="536" height="210" rx="9" fill="#252b50"/><circle cx="206" cy="116" r="83" fill="#3e5f89" opacity=".6"/><circle cx="340" cy="132" r="102" fill="#76519a" opacity=".6"/><text x="20" y="260" fill="#f4f7fb" font-family="system-ui" font-size="21" font-weight="700">New Latitude</text><rect x="20" y="280" width="83" height="26" rx="13" fill="#453b68"/><text x="35" y="298" fill="#c8bcff" font-family="system-ui" font-size="11" font-weight="700">DISCOVER</text><text x="20" y="335" fill="#aebbd0" font-family="system-ui" font-size="14">Anchored by familiar pacing and content.</text><text x="20" y="362" fill="#ffd166" font-family="system-ui" font-size="14">Stretch: this combination is new to your history.</text></g></svg>
