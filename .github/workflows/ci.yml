name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.21"
          python-version: "3.12"
          enable-cache: true
      - name: Install locked dependencies
        run: uv sync --locked --all-groups
      - name: Lint
        run: uv run --frozen ruff check .
      - name: Check formatting
        run: uv run --frozen ruff format --check .
      - name: Type check
        run: uv run --frozen mypy curator plugin/backend.py
      - name: Test
        run: uv run --frozen pytest
      - name: Check plugin JavaScript
        run: node --check plugin/stash-curator.js
      - name: Build plugin source
        run: uv run --frozen python scripts/build_plugin.py
      - uses: actions/upload-artifact@v4
        with:
          name: stash-curator-plugin
          path: |
            dist/stash-curator.zip
            dist/index.yml
