name: Stash Curator
description: Navigate your library, guided by your taste.
version: 0.1.0
url: https://github.com/mrx-31415/stash-curator

exec:
  - python
  - "{pluginDir}/backend.py"
  - "{pluginDir}"
interface: raw
errLog: info

ui:
  javascript:
    - stash-curator.js
  css:
    - stash-curator.css

settings:
  databasePath:
    displayName: Sidecar database path
    description: Leave empty to store data in the plugin's data directory.
    type: STRING
  pageSize:
    displayName: Scenes per lane
    description: Number of recommendations shown on each Curator lane. Default 20.
    type: NUMBER
  syncPageSize:
    displayName: Sync page size
    description: Number of Stash records fetched per synchronization request. Default 250.
    type: NUMBER
  modelUpdateEventThreshold:
    displayName: Actions before model update
    description: Rebuild after this many new playback or feedback actions. Default 5.
    type: NUMBER
  modelUpdateMaxWaitMinutes:
    displayName: Maximum model update delay (minutes)
    description: Rebuild pending preference changes after this delay. Default 30.
    type: NUMBER
  modelUpdateMinIntervalMinutes:
    displayName: Minimum model update interval (minutes)
    description: Minimum time between automatic preference-model rebuilds. Default 60.
    type: NUMBER
tasks:
  - name: Sync and build recommendations
    description: Incrementally synchronize Stash and publish a fresh model.
    execArgs:
      - sync-build
  - name: Full sync and build recommendations
    description: Reconcile the complete library and publish a fresh model.
    execArgs:
      - full-sync-build
  - name: Rebuild recommendation model
    description: Rebuild preferences from the existing sidecar cache.
    execArgs:
      - build
  - name: Apply recent Curator feedback
    description: Publish pending feedback and playback signals without blocking the Curator page.
    execArgs:
      - update-model
  - name: Backup Curator data
    description: Create a timestamped sidecar backup in the plugin data directory.
    execArgs:
      - backup
