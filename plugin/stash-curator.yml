name: Stash Curator
description: Navigate your library, guided by your taste.
version: 0.1.0
url: https://github.com/mrx-31415/stash-curator

exec:
  - python
  - "{pluginDir}/backend.py"
  - "{pluginDir}"
interface: raw
errLog: info

ui:
  javascript:
    - stash-curator.js
  css:
    - stash-curator.css

settings:
  databasePath:
    displayName: Sidecar database path
    description: Leave empty to store data in the plugin's data directory.
    type: STRING
  pageSize:
    displayName: Scenes per lane
    description: Number of recommendations shown on each Curator lane. Default 20.
    type: NUMBER
  syncPageSize:
    displayName: Sync page size
    description: Number of Stash records fetched per synchronization request. Default 250.
    type: NUMBER
  modelUpdateEventThreshold:
    displayName: Actions before model update
    description: Rebuild after this many new playback or feedback actions. Default 5.
    type: NUMBER
  modelUpdateMaxWaitMinutes:
    displayName: Maximum model update delay (minutes)
    description: Rebuild pending preference changes after this delay. Default 30.
    type: NUMBER
  modelUpdateMinIntervalMinutes:
    displayName: Minimum model update interval (minutes)
    description: Minimum time between automatic preference-model rebuilds. Default 60.
    type: NUMBER
  pruneTagName:
    displayName: Prune tag
    description: Tag applied by the Prune page. Default [Prune].
    type: STRING
  expandHorizonDays:
    displayName: Expand recent-release horizon (days)
    description: Recent-release window used by Expand. Default 90.
    type: NUMBER
  expandGender:
    displayName: External performer gender
    description: Default StashDB gender filter for Expand and Similar. Default FEMALE; leave empty for all.
    type: STRING
  expandWildcard:
    displayName: Expand popularity wildcard
    description: Include a small trending/popular sample outside preference-derived seeds.
    type: BOOLEAN
  whisparrUrl:
    displayName: Whisparr v3 URL
    description: Optional Whisparr base URL used by Expand scene actions.
    type: STRING
  whisparrApiKey:
    displayName: Whisparr API key
    description: Optional Whisparr API key. It is used only by the plugin backend.
    type: STRING
  whisparrRootFolder:
    displayName: Whisparr root folder
    description: Default root folder path for scenes sent from Expand.
    type: STRING
  whisparrQualityProfileId:
    displayName: Whisparr quality profile ID
    description: Default numeric quality profile ID for scenes sent from Expand.
    type: NUMBER
  whisparrSearchImmediately:
    displayName: Search Whisparr immediately
    description: Start a release search after adding a scene. Enabled by default.
    type: BOOLEAN
tasks:
  - name: Sync and build recommendations
    description: Incrementally synchronize Stash and publish a fresh model.
    execArgs:
      - sync-build
  - name: Full sync and build recommendations
    description: Reconcile the complete library and publish a fresh model.
    execArgs:
      - full-sync-build
  - name: Rebuild recommendation model
    description: Rebuild preferences from the existing sidecar cache.
    execArgs:
      - build
  - name: Apply recent Curator feedback
    description: Publish pending feedback and playback signals without blocking the Curator page.
    execArgs:
      - update-model
  - name: Prepare recommendation pages
    description: Warm the fast page cache for the current model without rebuilding it.
    execArgs:
      - prepare
  - name: Backup Curator data
    description: Create a timestamped sidecar backup in the plugin data directory.
    execArgs:
      - backup
  - name: Refresh Expand cache
    description: Refresh promising StashDB scenes and performers without affecting library sync.
    execArgs:
      - expand-refresh
